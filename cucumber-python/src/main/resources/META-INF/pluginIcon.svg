<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="600px" height="600px" viewBox="0 0 600 600" xml:space="preserve">

  <!-- Cucumber+ family cue: pale blue disc -->
  <ellipse cx="300" cy="300" rx="280" ry="280"
           style="fill:#9bb2d4;fill-opacity:0.50"/>

  <!-- Cucumber rendered in Python's two-tone (blue top / yellow bottom),
       with the two "snake head" eyes — evokes both Cucumber and Python. -->
  <g transform="translate(300,305) rotate(-32)">
    <defs>
      <clipPath id="topHalf" clipPathUnits="userSpaceOnUse">
        <rect x="-220" y="-190" width="440" height="190"/>
      </clipPath>
    </defs>

    <!-- full capsule (yellow) -->
    <rect x="-185" y="-74" width="370" height="148" rx="74" fill="#FFD43B"/>
    <!-- upper half (blue) -->
    <rect x="-185" y="-74" width="370" height="148" rx="74" fill="#3776AB" clip-path="url(#topHalf)"/>

    <!-- subtle seam + a couple of cucumber seeds -->
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#2b5e86" stroke-opacity="0.25" stroke-width="6"/>

    <!-- snake-head eyes -->
    <circle cx="-150" cy="-34" r="15" fill="#FFD43B"/>  <!-- blue head -->
    <circle cx="150"  cy="34"  r="15" fill="#3776AB"/>  <!-- yellow head -->
  </g>

  <!-- Cucumber+ green cucumber "C" badge (top-right) — same shape as the Cucumber+ icon -->
  <g transform="translate(250,40) scale(0.55)">
    <g transform="matrix(0.96966017,0,0,0.96966017,319.74969,12.548046)">
      <path style="stroke-width:1" fill="#00A818"
            d="M 131.14544,-0.29425107 C 59.653425,-0.29425107 1.7954265,57.72375 1.7954265,129.41375 c 0,63.11899 45.1199985,115.564 104.6650035,127.23199 v 37.13001 c 77.413,-11.70301 145.958,-73.32401 151.073,-154.21301 3.07801,-48.688991 -21.13,-98.39399 -61.95999,-122.529991 -2.338,-1.381 -4.713,-2.753 -7.159,-3.96 -2.492,-1.23 -5.051,-2.427999 -7.652,-3.4660003 -0.826,-0.346 -1.635,-0.66 -2.469,-0.99 -2.271,-0.8399998 -4.563,-1.7869998 -6.911,-2.4749998 -12.658,-4.182999 -26.188,-6.43599997 -40.237,-6.43599997 z" />
    </g>
  </g>

</svg>
