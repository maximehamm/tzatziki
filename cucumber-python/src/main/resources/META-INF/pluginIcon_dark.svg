    <defs>
      <clipPath id="topHalfDark" clipPathUnits="userSpaceOnUse">
        <rect x="-220" y="-190" width="440" height="190"/>
      </clipPath>
    </defs>

    <rect x="-185" y="-74" width="370" height="148" rx="74" fill="#FFD43B"/>
    <rect x="-185" y="-74" width="370" height="148" rx="74" fill="#4B8BBE" clip-path="url(#topHalfDark)"/>

    <line x1="-150" y1="0" x2="150" y2="0" stroke="#1f4763" stroke-opacity="0.30" stroke-width="6"/>

    <circle cx="-150" cy="-34" r="15" fill="#FFD43B"/>
    <circle cx="150"  cy="34"  r="15" fill="#4B8BBE"/>
  </g>

  <!-- Cucumber+ green cucumber "C" badge (top-right) — same shape as the Cucumber+ icon -->
