<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
  <!-- "Partial mute" base disc, sized 14x14 to match the New-UI breakpoint dot (same as the
       Cucumber+ Gherkin disc). Split DIAGONALLY: lower-left half is a SOLID red disc,
       upper-right half is a hollow red RING. The green Cucumber+ disc badge layers on top. -->
  <!-- red ring (annulus: outer r=7, inner r=5.5 → thin 1.5px stroke), evenodd carves the hole -->
  <path fill="#DB5860" fill-rule="evenodd" d="M0 7 A7 7 0 1 0 14 7 A7 7 0 1 0 0 7 Z M1.5 7 A5.5 5.5 0 1 0 12.5 7 A5.5 5.5 0 1 0 1.5 7 Z"/>
  <!-- solid red lower-left half — fills the hole on that side only -->
  <path fill="#DB5860" d="M2.05 2.05 A7 7 0 0 0 11.95 11.95 Z"/>
</svg>
